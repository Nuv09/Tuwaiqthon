<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عسيب - إضافة مزرعة جديدة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>

    <style>
        :root {
            --green-dark:  #3A5A40;
            --green-light: #A3B18A;
            --brown:       #7F5539;
            --cream:       #EDE0D4;

            --bg:          #1a2b1c;
            --bg2:         #142016;
            --text:        var(--cream);
            --text-dim:    rgba(237,224,212,0.5);
            --border:      rgba(237,224,212,0.12);
            --border-hi:   rgba(255,255,255,0.22);
            --glass:       rgba(127,85,57,0.18);
            --input-bg:    rgba(237,224,212,0.07);
            --shadow:      0 30px 70px rgba(0,0,0,0.5);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Tajawal', sans-serif;
            min-height: 100vh;
            background: #1e3a22;
            background-image:
                radial-gradient(ellipse at 15% 0%,   #3a6b42 0%, transparent 50%),
                radial-gradient(ellipse at 85% 100%, #4a3020 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%,  #2a4a30 0%, transparent 70%);
            color: var(--text);
            direction: rtl;
            padding-top: 80px;
        }

        /* ══════════════════════════════
           NAVBAR
        ══════════════════════════════ */
        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 68px;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            background: rgba(20,32,22,0.82);
            backdrop-filter: blur(22px);
            border-bottom: 1px solid var(--border);
        }

        .nav-brand {
            display: flex;
            align-items: center;
        }

        .nav-links {
            display: flex;
            gap: 6px;
            position: relative;
        }

        /* Sliding indicator */
        .nav-indicator {
            position: absolute;
            bottom: -18px;
            height: 2.5px;
            background: #EDE0D4;
            border-radius: 2px;
            transition: all 0.38s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        .nav-item {
            color: var(--text-dim);
            text-decoration: none;
            padding: 8px 22px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.3s;
            position: relative;
            border-radius: 8px;
            white-space: nowrap;
        }

        .nav-item:hover { color: #EDE0D4; background: rgba(255,255,255,0.04); }
        .nav-item.active { color: #EDE0D4; font-weight: 800; }

        /* ══════════════════════════════
           PAGE
        ══════════════════════════════ */
        .page {
            max-width: 980px;
            margin: 0 auto;
            padding: 48px 24px 90px;
        }

        /* PAGE HEADER */
        .page-header {
            text-align: center;
            margin-bottom: 50px;
            padding: 20px 0;
        }

        .page-header-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(163,177,138,0.12);
            border: 1px solid rgba(163,177,138,0.3);
            color: var(--green-light);
            font-size: 0.82rem;
            font-weight: 700;
            padding: 6px 16px;
            border-radius: 30px;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .page-header-tag::before {
            content: '';
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--green-light);
        }

        .page-header h1 {
            font-size: 3rem;
            font-weight: 900;
            color: var(--text);
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .h1-accent {
            color: var(--green-light);
            position: relative;
        }

        .h1-accent::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 0; left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--green-dark), var(--green-light));
            border-radius: 2px;
        }

        .page-header p {
            color: var(--text-dim);
            font-size: 1.05rem;
            margin-bottom: 28px;
        }

        .header-line {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, var(--green-dark), var(--green-light));
            border-radius: 2px;
            margin: 0 auto;
        }

        /* ══════════════════════════════
           CARDS
        ══════════════════════════════ */
        .card {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            border-top: 1px solid rgba(255,255,255,0.2);
            border-right: 1px solid rgba(255,255,255,0.2);
            border-radius: 28px;
            padding: 38px;
            box-shadow: var(--shadow);
            margin-bottom: 22px;
            transition: border-color 0.35s, transform 0.35s, background 0.35s;
        }

        .card:hover {
            background: rgba(255,255,255,0.11);
            border-color: rgba(163,177,138,0.3);
            transform: translateY(-2px);
        }

        .card-title {
            font-size: 1.05rem;
            font-weight: 800;
            color: #EDE0D4;
            margin-bottom: 26px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 18px;
            border-bottom: 1px solid rgba(237,224,212,0.1);
        }

        .step-badge {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--green-dark), var(--green-light));
            color: #fff;
            font-size: 0.78rem;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 3px 10px rgba(58,90,64,0.4);
        }

        /* ══════════════════════════════
           FORM
        ══════════════════════════════ */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group { display: flex; flex-direction: column; gap: 9px; }
        .form-group.full { grid-column: span 2; }

        label {
            font-size: 0.88rem;
            font-weight: 700;
            color: #EDE0D4;
            letter-spacing: 0.2px;
        }

        input[type="text"],
        input[type="number"],
        select,
        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 14px 18px;
            border-radius: 14px;
            border: 1px solid rgba(237,224,212,0.15);
            background: rgba(255,255,255,0.06);
            color: #EDE0D4;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
            appearance: none;
            -webkit-appearance: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #A3B18A;
            background: rgba(255,255,255,0.06);
            box-shadow: 0 0 0 3px rgba(163,177,138,0.1);
        }

        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        textarea:-webkit-autofill,
        select:-webkit-autofill {
            -webkit-text-fill-color: #3A5A40 !important;
            -webkit-box-shadow: 0 0 0px 1000px #EDE0D4 inset !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        input[type="text"]:not(:placeholder-shown),
        input[type="number"]:not(:placeholder-shown),
        textarea:not(:placeholder-shown),
        select:valid {
            background: rgba(237,224,212,0.12) !important;
            color: #EDE0D4 !important;
        }

        ::placeholder { color: rgba(237,224,212,0.35); }
        .select-wrap {
            position: relative;
        }

        .select-wrap::after {
            content: '▾';
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--green-light);
            font-size: 1rem;
            pointer-events: none;
        }

        .select-wrap select {
            padding-left: 40px;
            cursor: pointer;
        }

        select option {
            background: #EDE0D4;
            color: #3A5A40;
            font-weight: 600;
            padding: 10px;
        }

        select option:hover {
            background: #A3B18A;
            color: #fff;
        }

        textarea { resize: vertical; min-height: 95px; }

        /* ══════════════════════════════
           MAP
        ══════════════════════════════ */
        .search-wrap { position: relative; margin-bottom: 16px; }
        .search-wrap i {
            position: absolute;
            right: 16px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            pointer-events: none;
        }
        .search-wrap input { padding-right: 46px; }

        .map-wrap {
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid var(--border);
            height: 390px;
        }
        #map { width: 100%; height: 100%; }

        .map-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .map-hint {
            font-size: 0.85rem;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 7px;
        }

        /* ══════════════════════════════
           BUTTONS
        ══════════════════════════════ */
        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border-hi);
            color: var(--text-dim);
            padding: 10px 22px;
            border-radius: 10px;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-ghost:hover {
            border-color: #c0392b;
            color: #e74c3c;
            background: rgba(231,76,60,0.07);
        }

        .btn-submit {
            width: 100%;
            padding: 17px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-light) 100%);
            color: #fff;
            font-family: 'Cairo', sans-serif;
            font-size: 1.15rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
            box-shadow: 0 8px 28px rgba(58,90,64,0.4);
            position: relative;
            overflow: hidden;
            margin-top: 6px;
            letter-spacing: 0.3px;
        }

        .btn-submit::after {
            content: '';
            position: absolute;
            top: -50%; left: -60%;
            width: 20%; height: 200%;
            background: rgba(255,255,255,0.3);
            transform: rotate(30deg);
            transition: left 0.6s;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 38px rgba(58,90,64,0.55);
        }
        .btn-submit:hover::after { left: 130%; }

        /* ══════════════════════════════
           DIVIDER
        ══════════════════════════════ */
        .divider {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 6px 0 22px;
            color: var(--text-dim);
            font-size: 0.8rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ══ SUCCESS MODAL ══ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(6px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.18);
            border-top: 1px solid rgba(255,255,255,0.35);
            border-radius: 28px;
            padding: 48px 52px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            transform: scale(0.85) translateY(20px);
            transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
            box-shadow: 0 30px 80px rgba(0,0,0,0.4);
        }

        .modal-overlay.show .modal {
            transform: scale(1) translateY(0);
        }

        .modal-icon {
            width: 72px; height: 72px;
            border-radius: 50%;
            background: rgba(163,177,138,0.15);
            border: 1px solid rgba(163,177,138,0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 20px;
        }

        .modal h2 {
            font-size: 1.5rem;
            font-weight: 800;
            color: #EDE0D4;
            margin-bottom: 10px;
        }

        .modal p {
            color: rgba(237,224,212,0.65);
            font-size: 0.95rem;
            margin-bottom: 30px;
            line-height: 1.7;
        }

        .modal-btn {
            background: linear-gradient(135deg, #3A5A40, #A3B18A);
            color: #fff;
            border: none;
            padding: 13px 40px;
            border-radius: 50px;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(58,90,64,0.4);
        }

        .modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(58,90,64,0.5);
        }
        .leaflet-control-zoom { border: none !important; border-radius: 10px !important; overflow: hidden; }
        .leaflet-bar a {
            background: rgba(20,32,22,0.9) !important;
            color: var(--text) !important;
            border-color: var(--border) !important;
            backdrop-filter: blur(8px);
        }
        .leaflet-bar a:hover { color: var(--green-light) !important; }
        .leaflet-draw-toolbar a {
            background-image: url('https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/images/spritesheet.png') !important;
        }
        .leaflet-retina .leaflet-draw-toolbar a {
            background-image: url('https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/images/spritesheet-2x.png') !important;
        }

        /* ══════════════════════════════
           RESPONSIVE
        ══════════════════════════════ */
        @media (max-width: 680px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full { grid-column: span 1; }
            .navbar { padding: 0 20px; }
            .card { padding: 24px 18px; border-radius: 20px; }
            .page-header h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="nav-brand">
        <img src="images/logo5.png" alt="عسيب" style="height:120px; width:auto; mix-blend-mode:screen;">
    </div>
    <div class="nav-links" id="navLinks">
        <div class="nav-indicator" id="navIndicator"></div>
        <a href="Home_page.html" class="nav-item" data-nav>مزارعي</a>
        <a href="add_farm.html" class="nav-item active" data-nav>إضافة مزرعة</a>
    </div>
</nav>

<div class="page">

    <!-- PAGE HEADER -->
    <div class="page-header">

        <h1>إضافة <span class="h1-accent">مزرعة</span></h1>
        <p style="color: rgba(237,224,212,0.85);">ادخل بيانات المزرعة وحدد نطاقها على الخريطة</p>
        <div class="header-line" style="display:none;"></div>
    </div>

    <form id="addFarmForm" onsubmit="event.preventDefault(); submitFarm();">

        <!-- CARD 1 -->
        <div class="card">
            <div class="card-title">
                <span class="step-badge">١</span>
                <i class="fa-solid fa-seedling"></i>
                بيانات المزرعة الأساسية
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label>اسم المزرعة</label>
                    <input type="text" id="farmName" placeholder="مثال: مزرعة النخيل الذهبي" required>
                </div>
                <div class="form-group">
                    <label>اسم المالك</label>
                    <input type="text" id="ownerName" placeholder="الاسم الكامل" required>
                </div>
                <div class="form-group">
                    <label>رقم العقد</label>
                    <input type="text" id="contractNum" placeholder="اختياري">
                </div>
                <div class="form-group">
                    <label>مساحة المزرعة (م²)</label>
                    <input type="number" id="farmArea" placeholder="0" required>
                </div>
                <div class="form-group full">
                    <label>المنطقة</label>
                    <div class="select-wrap">
                        <select id="region" required>
                            <option value="" disabled selected>اختر المنطقة</option>
                            <option>الرياض</option>
                            <option>مكة المكرمة</option>
                            <option>المدينة المنورة</option>
                            <option>القصيم</option>
                            <option>المنطقة الشرقية</option>
                            <option>عسير</option>
                            <option>تبوك</option>
                            <option>حائل</option>
                            <option>الحدود الشمالية</option>
                            <option>جازان</option>
                            <option>نجران</option>
                            <option>الباحة</option>
                            <option>الجوف</option>
                        </select>
                    </div>
                </div>
                <div class="form-group full">
                    <label>ملاحظات إضافية</label>
                    <textarea id="notes" placeholder="أي معلومات إضافية عن المزرعة..."></textarea>
                </div>
            </div>
        </div>

        <!-- CARD 2 -->
        <div class="card">
            <div class="card-title">
                <span class="step-badge">٢</span>
                <i class="fa-solid fa-map-location-dot"></i>
                تحديد نطاق المزرعة على الخريطة
            </div>

            <div class="search-wrap">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="locationSearch" placeholder="ابحث عن موقع المزرعة...">
            </div>

            <div class="map-wrap">
                <div id="map"></div>
            </div>

            <div class="map-footer">
                <button type="button" class="btn-ghost" onclick="clearAllShapes()">
                    <i class="fa-solid fa-trash"></i> مسح الكل
                </button>
                <span class="map-hint">
                    <i class="fa-solid fa-draw-polygon"></i>
                    ارسم حدود المزرعة باستخدام أدوات الخريطة
                </span>
            </div>
        </div>

        <!-- SUBMIT -->
        <button type="submit" class="btn-submit">
            <i class="fa-solid fa-plus" style="margin-left:10px;"></i>
            إضافة المزرعة
        </button>

    </form>
</div>

<!-- SUCCESS MODAL -->
<div class="modal-overlay" id="successModal">
    <div class="modal">
        <div class="modal-icon">✅</div>
        <h2>تمت الإضافة بنجاح!</h2>
        <p>تمت إضافةالمزرعة بنجاح<br>هل تريدالذهاب لصفحة مزارعي؟</p>
        <div style="display:flex; gap:12px; justify-content:center;">
            <button class="modal-btn" onclick="goFarms()">نعم، اذهب</button>
            <button class="modal-btn" onclick="stayHere()" style="background: rgba(255,255,255,0.1); box-shadow:none; border: 1px solid rgba(237,224,212,0.2);">إلغاء</button>
        </div>
    </div>
</div>


<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script>
    /* ── SLIDING NAV INDICATOR ── */
    const navLinks   = document.querySelectorAll('[data-nav]');
    const indicator  = document.getElementById('navIndicator');
    const navWrap    = document.getElementById('navLinks');

    function moveIndicator(el) {
        const wrapRect = navWrap.getBoundingClientRect();
        const elRect   = el.getBoundingClientRect();
        indicator.style.width  = elRect.width + 'px';
        // RTL: calculate from right
        indicator.style.right  = (wrapRect.right - elRect.right) + 'px';
        indicator.style.left   = 'auto';
    }

    // Init on active
    const activeLink = document.querySelector('.nav-item.active');
    if (activeLink) {
        setTimeout(() => moveIndicator(activeLink), 50);
    }

    navLinks.forEach(link => {
        link.addEventListener('mouseenter', () => moveIndicator(link));
        link.addEventListener('click', function() {
            navLinks.forEach(l => l.classList.remove('active'));
            this.classList.add('active');
            moveIndicator(this);
        });
    });

    // Reset to active on mouse leave
    document.getElementById('navLinks').addEventListener('mouseleave', () => {
        const active = document.querySelector('.nav-item.active');
        if (active) moveIndicator(active);
    });

    /* ── MAP ── */
    let currentPolygonCoordinates = null;

    const map = L.map('map', { zoomControl: false }).setView([24.7136, 46.6753], 6);
    L.control.zoom({ position: 'topright' }).addTo(map);

    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Tiles &copy; Esri', maxZoom: 19
    }).addTo(map);

    const drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);

    const drawControl = new L.Control.Draw({
        position: 'topright',
        draw: {
            polyline: false, circle: false, circlemarker: false,
            marker: false, rectangle: false,
            polygon: {
                allowIntersection: false,
                showArea: true,
                shapeOptions: { color: '#e74c3c', fillColor: '#e74c3c', fillOpacity: 0.2, weight: 2 }
            }
        },
        edit: { featureGroup: drawnItems, remove: true, edit: true }
    });
    map.addControl(drawControl);

    map.on(L.Draw.Event.CREATED, function(e) {
        drawnItems.addLayer(e.layer);
        if (e.layer instanceof L.Polygon) {
            currentPolygonCoordinates = e.layer.getLatLngs()[0].map(ll => ({ lat: ll.lat, lng: ll.lng }));
            // Clear map error
            const mapWrap = document.querySelector('.map-wrap');
            mapWrap.style.borderColor = '';
            mapWrap.style.boxShadow = '';
            const mapErr = document.querySelector('.map-err');
            if (mapErr) mapErr.remove();
        }
    });

    map.on(L.Draw.Event.DELETED, function() {
        if (drawnItems.getLayers().length === 0) currentPolygonCoordinates = null;
    });

    function clearAllShapes() {
        drawnItems.clearLayers();
        currentPolygonCoordinates = null;
    }

    function showError(id, msg) {
        const el = document.getElementById(id);
        el.style.borderColor = '#e74c3c';
        el.style.boxShadow = '0 0 0 3px rgba(231,76,60,0.15)';
        let err = el.parentElement.querySelector('.err-msg');
        if (!err) {
            err = document.createElement('span');
            err.className = 'err-msg';
            err.style.cssText = 'color:#e74c3c;font-size:0.82rem;margin-top:4px;display:block;';
            el.parentElement.appendChild(err);
        }
        err.textContent = '⚠ ' + msg;
    }

    function clearError(id) {
        const el = document.getElementById(id);
        el.style.borderColor = '';
        el.style.boxShadow = '';
        const err = el.parentElement.querySelector('.err-msg');
        if (err) err.remove();
    }

    // Clear error on input
    ['farmName','ownerName','farmArea','region'].forEach(id => {
        document.getElementById(id).addEventListener('input', () => clearError(id));
        document.getElementById(id).addEventListener('change', () => clearError(id));
    });

    function submitFarm() {
        let valid = true;

        const farmName = document.getElementById('farmName').value.trim();
        const ownerName = document.getElementById('ownerName').value.trim();
        const farmArea = document.getElementById('farmArea').value;
        const region = document.getElementById('region').value;

        if (!farmName) { showError('farmName', 'اسم المزرعة مطلوب'); valid = false; }
        if (!ownerName) { showError('ownerName', 'اسم المالك مطلوب'); valid = false; }
        if (!farmArea || farmArea <= 0) { showError('farmArea', 'أدخل مساحة صحيحة'); valid = false; }
        if (!region) { showError('region', 'يرجى اختيار المنطقة'); valid = false; }
        if (!currentPolygonCoordinates) {
            const mapWrap = document.querySelector('.map-wrap');
            mapWrap.style.borderColor = '#e74c3c';
            mapWrap.style.boxShadow = '0 0 0 3px rgba(231,76,60,0.2)';
            let mapErr = document.querySelector('.map-err');
            if (!mapErr) {
                mapErr = document.createElement('p');
                mapErr.className = 'map-err';
                mapErr.style.cssText = 'color:#e74c3c;font-size:0.82rem;margin-top:8px;';
                mapErr.textContent = '⚠ يرجى رسم حدود المزرعة على الخريطة';
                mapWrap.after(mapErr);
            }
            valid = false;
        }

        if (!valid) return;

        const formData = {
            farmName,
            ownerName,
            contractNum: document.getElementById('contractNum').value,
            farmArea,
            region,
            notes:       document.getElementById('notes').value,
            polygonCoordinates: currentPolygonCoordinates,
            dateAdded: new Date().toLocaleDateString('ar-SA')
        };
const submitBtn = document.querySelector('.btn-submit');
submitBtn.disabled = true;
submitBtn.textContent = 'جاري التحليل...';

fetch('/api/analyze', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ polygonCoordinates: currentPolygonCoordinates })
})
.then(res => res.json())
.then(data => {
    const points = data.points || [];
    const total = points.length;
    if (total > 0) {
        formData.healthScore   = Math.round((points.filter(p => p.status === 'healthy').length  / total) * 100);
        formData.stressScore   = Math.round((points.filter(p => p.status === 'stressed').length / total) * 100);
        formData.criticalScore = Math.round((points.filter(p => p.status === 'critical').length / total) * 100);
    }
})
.catch(() => {
    formData.healthScore = null;
})
.finally(() => {
    let farms = JSON.parse(localStorage.getItem("farms")) || [];
    farms.push(formData);
    localStorage.setItem("farms", JSON.stringify(farms));
    submitBtn.disabled = false;
    submitBtn.textContent = 'إضافة المزرعة';
    document.getElementById('successModal').classList.add('show');
});
    }

    function goHome() {
        window.location.href = "/";
    }

function goFarms() {
    window.location.href = "/home";
}

    function stayHere() {
        document.getElementById('successModal').classList.remove('show');
        // نظف الفورم
        document.getElementById('addFarmForm').reset();
        drawnItems.clearLayers();
        currentPolygonCoordinates = null;
        // نظف الأخطاء
        document.querySelectorAll('.err-msg').forEach(e => e.remove());
        document.querySelectorAll('input, select, textarea').forEach(el => {
            el.style.borderColor = '';
            el.style.boxShadow = '';
        });
        const mapWrap = document.querySelector('.map-wrap');
        mapWrap.style.borderColor = '';
        mapWrap.style.boxShadow = '';
        const mapErr = document.querySelector('.map-err');
        if (mapErr) mapErr.remove();
    }
</script>
</body>
</html>
