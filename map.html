<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAAF - خريطة المزرعة</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Google Fonts for Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        :root {
            /* Theme Colors */
            --primary-dark: #021a16;
            --primary: #042C25;
            --primary-light: #064036;
            --accent: #FDCB6E;
            --text-light: #FFF6E0;
            --bg-gradient: linear-gradient(135deg, #042C25 0%, #064036 100%);

            /* UI Elements */
            --card-bg: rgba(4, 44, 37, 0.85);
            --card-border: rgba(254, 187, 151, 0.2);
            --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.3);

            /* Map Overlay Colors */
            --color-healthy: #22c55e;
            --color-suspect: #FEBB97;
            --color-infected: #ef4444;

            /* Prediction Overlay Colors (Slightly altered) */
            --predict-healthy: #22c55e;
            --predict-suspect: #FEBB97;
            --predict-infected: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-light);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Navigation Bar */
        .navbar {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px 20px;
            background: rgba(4, 44, 37, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--card-border);
            box-shadow: var(--shadow-soft);
            z-index: 1000;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.25);
            padding: 6px;
            border-radius: 30px;
        }

        .nav-tab {
            padding: 8px 26px;
            border-radius: 24px;
            color: var(--text-light);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            font-size: 1.05rem;
        }

        .nav-tab.active {
            background: var(--accent);
            color: var(--primary-dark);
            box-shadow: 0 4px 12px rgba(254, 187, 151, 0.4);
        }

        .nav-tab:hover:not(.active) {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Main Workspace */
        .main-container {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Map Wrapper */
        .map-wrapper {
            position: relative;
            flex: 1;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--card-border);
        }

        #map {
            width: 100%;
            height: 100%;
            background-color: var(--primary-dark);
        }

        /* Hovering UI Cards Container Base */
        .floating-card {
            position: absolute;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 16px 22px;
            color: var(--text-light);
            box-shadow: var(--shadow-soft);
            z-index: 1000;
        }

        /* Action Bar Container */
        .action-bar {
            width: 100%;
            display: flex;
            justify-content: flex-start;
            /* Right aligned in RTL */
            margin-bottom: 20px;
        }

        /* Back Button */
        .back-button {
            background: var(--accent);
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
            font-size: 1.05rem;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            border-radius: 16px;
            box-shadow: var(--shadow-soft);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
        }

        .back-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(253, 203, 110, 0.4);
        }

        /* Top Left Toggle Component */
        .toggle-container {
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 150px;
        }

        .toggle-label-text {
            font-weight: 700;
            font-size: 1.05rem;
            transition: color 0.3s ease;
        }

        .toggle-switch-wrapper {
            display: flex;
            align-items: center;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 28px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.2);
            transition: .4s;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            right: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        input:checked+.slider {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        input:checked+.slider:before {
            transform: translateX(-24px);
        }

        /* Bottom Left Information Card */
        .area-card {
            bottom: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            text-align: right;
        }

        .area-label {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 600;
        }

        .area-value {
            color: var(--accent);
            font-size: 1.4rem;
            font-weight: 700;
        }

        /* Bottom Right Legend Items */
        .legend-card {
            bottom: 20px;
            right: 20px;
            min-width: 160px;
        }

        .legend-title {
            font-weight: 700;
            margin-bottom: 14px;
            font-size: 1.1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            padding-bottom: 8px;
        }

        .legend-items {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            font-weight: 600;
        }

        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .color-healthy {
            background: var(--color-healthy);
            box-shadow: 0 0 10px var(--color-healthy);
        }

        .color-suspect {
            background: var(--color-suspect);
            box-shadow: 0 0 10px var(--color-suspect);
        }

        .color-infected {
            background: var(--color-infected);
            box-shadow: 0 0 10px var(--color-infected);
        }

        /* Leaflet Controls Styling */
        .leaflet-control-zoom {
            margin-top: 20px !important;
            margin-right: 20px !important;
            border: none !important;
            box-shadow: var(--shadow-soft) !important;
            border-radius: 8px !important;
            overflow: hidden;
        }

        .leaflet-bar a {
            background-color: var(--card-bg) !important;
            color: var(--text-light) !important;
            border: 1px solid var(--card-border) !important;
            backdrop-filter: blur(5px);
        }

        .leaflet-bar a:hover {
            background-color: var(--primary-light) !important;
            color: white !important;
        }

        .leaflet-control-attribution {
            background: rgba(0, 0, 0, 0.6) !important;
            color: #ccc !important;
            border-radius: 8px 0 0 0;
            padding: 2px 8px !important;
        }

        .leaflet-control-attribution a {
            color: var(--accent) !important;
        }
    </style>
</head>

<body>

    <!-- Main Top Navigation -->
    <nav class="navbar">
        <div class="nav-tabs">
            <a href="#" class="nav-tab active">الخريطة</a>
            <a href="#" class="nav-tab">الحالة</a>
            <a href="#" class="nav-tab">الوقاية والتنبؤ</a>
        </div>
    </nav>

    <!-- Map Content Area -->
    <main class="main-container">
        <!-- Optional Top Header Padding Space -->
        <div class="action-bar">
            <!-- Back Button OUTSIDE Map -->
            <a href="Home_page.html" class="back-button">
                العودة للرئيسية
                <i class="fa-solid fa-arrow-left"></i>
            </a>
        </div>

        <div class="map-wrapper">
            <!-- Map Target Division -->
            <div id="map"></div>

            <!-- Floating UI: Top Left Control Toggle -->
            <div class="floating-card toggle-container">
                <div class="toggle-label-text" id="modeLabel">الوضع الحالي</div>
                <div class="toggle-switch-wrapper">
                    <label class="switch">
                        <input type="checkbox" id="modeToggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <!-- Floating UI: Bottom Left Area Information -->
            <div class="floating-card area-card">
                <span class="area-label">المساحة</span>
                <span class="area-value" id="farmAreaValue">--</span>
            </div>

            <!-- Floating UI: Bottom Right Status Legend -->
            <div class="floating-card legend-card">
                <div class="legend-title">مؤشر الحالة</div>
                <div class="legend-items">
                    <div class="legend-item">
                        <div class="legend-color color-healthy" id="leg-healthy"></div>
                        <span>سليم</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color color-suspect" id="leg-suspect"></div>
                        <span>مشتبه به</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color color-infected" id="leg-infected"></div>
                        <span>مصاب</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Leaflet JS Library -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // System Config Palette
        const mapColors = {
            current: {
                healthy: getComputedStyle(document.documentElement).getPropertyValue('--color-healthy').trim(),
                suspect: getComputedStyle(document.documentElement).getPropertyValue('--color-suspect').trim(),
                infected: getComputedStyle(document.documentElement).getPropertyValue('--color-infected').trim()
            },
            predict: {
                healthy: getComputedStyle(document.documentElement).getPropertyValue('--predict-healthy').trim(),
                suspect: getComputedStyle(document.documentElement).getPropertyValue('--predict-suspect').trim(),
                infected: getComputedStyle(document.documentElement).getPropertyValue('--predict-infected').trim()
            }
        };

        // Initialize Map component
        const map = L.map('map', {
            zoomControl: false,
            attributionControl: true
        }).setView([25.3833, 49.5833], 18); // Centered on test location (Al Ahsa bounds)

        // Relocate Zoom Control
        L.control.zoom({
            position: 'topright'
        }).addTo(map);

        // Map Tile Layer (High Resolution Satellite via Esri)
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri &mdash; Source: Esri, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP',
            maxZoom: 19
        }).addTo(map);

        // جلب المزرعة المختارة
        const selectedFarm = JSON.parse(localStorage.getItem("selectedFarm"));

        // تحديث المساحة من بيانات المزرعة
        if (selectedFarm && selectedFarm.farmArea) {
            const areaElement = document.getElementById("farmAreaValue");
            areaElement.innerText = Number(selectedFarm.farmArea).toLocaleString() + " م²";
        }

        if (selectedFarm && selectedFarm.polygonCoordinates) {

            const latlngs = selectedFarm.polygonCoordinates.map(coord => [
                coord.lat,
                coord.lng
            ]);

            const polygon = L.polygon(latlngs, {
                color: "#FDCB6E",
                fillColor: "#FDCB6E",
                fillOpacity: 0.3
            }).addTo(map);

            map.fitBounds(polygon.getBounds());
        }

        // Generate Sample Grid defining Palm Positions
        const farmCenter = [25.3833, 49.5833];
        const palms = [];
        const gridSize = 12;
        const spacing = 0.00012;

        for (let i = -gridSize / 2; i < gridSize / 2; i++) {
            for (let j = -gridSize / 2; j < gridSize / 2; j++) {
                // Skiping some nodes adds organic farm feeling
                if (Math.random() > 0.85) continue;

                const rand = Math.random();
                let status = 'healthy';
                if (rand > 0.90) status = 'infected';
                else if (rand > 0.75) status = 'suspect';

                palms.push({
                    lat: farmCenter[0] + i * spacing + (Math.random() * 0.00004 - 0.00002),
                    lng: farmCenter[1] + j * spacing + (Math.random() * 0.00004 - 0.00002),
                    status: status,
                    predictStatus: calculateTrend(status)
                });
            }
        }

        // Dummy algorithmic logic for Prediction Toggle
        function calculateTrend(currentStatus) {
            if (currentStatus === 'infected') return 'infected';
            if (currentStatus === 'suspect') return Math.random() > 0.4 ? 'infected' : 'suspect';
            return Math.random() > 0.85 ? 'suspect' : 'healthy';
        }

        // Render Data overlays
        const circles = [];
        palms.forEach(palm => {
            const circle = L.circle([palm.lat, palm.lng], {
                color: mapColors.current[palm.status],
                fillColor: mapColors.current[palm.status],
                fillOpacity: 0.65,
                radius: 4.5,
                weight: 1.5
            }).addTo(map);

            circle.palmData = palm; // cache state
            circles.push(circle);
        });

        // Reactive UI Toggle Event
        const modeToggle = document.getElementById('modeToggle');
        const modeLabel = document.getElementById('modeLabel');

        modeToggle.addEventListener('change', (e) => {
            const isPredict = e.target.checked;

            if (isPredict) {
                // Switch to Warning/Prediction Mode
                modeLabel.innerText = 'وضع التنبؤ';
                modeLabel.style.color = mapColors.predict.suspect;

                circles.forEach(c => {
                    const nextStatus = c.palmData.predictStatus;
                    const cColor = mapColors.predict[nextStatus];
                    c.setStyle({
                        color: cColor,
                        fillColor: cColor,
                        fillOpacity: 0.75
                    });
                });

            } else {
                // Revert to General Current Mode
                modeLabel.innerText = 'الوضع الحالي';
                modeLabel.style.color = 'var(--text-light)';

                circles.forEach(c => {
                    const status = c.palmData.status;
                    const cColor = mapColors.current[status];
                    c.setStyle({
                        color: cColor,
                        fillColor: cColor,
                        fillOpacity: 0.65
                    });
                });
            }
        });
    </script>
</body>

</html>
